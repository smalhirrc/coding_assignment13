name: Node.js Assignment CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install --legacy-peer-deps

    # Runs Prettier and actively fixes any formatting errors
    - name: Run Prettier and Auto-Fix Styles
      run: npx prettier --write src

    # Automatically commits and pushes Prettier's fixes back to your repo
    - name: Commit and Push Prettier Fixes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "style: automated prettier formatting fixes"


    # Checks ESLint rules (fails if custom configurations are broken)
    - name: Run ESLint Verification
      run: npm run lint

    # Runs testing suite and immediately exits (CI safe mode)
    - name: Run Application Tests
      run: CI=true npm test
